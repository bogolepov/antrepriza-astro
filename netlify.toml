[[plugins]]
  package = '@netlify/plugin-sitemap'

	[plugins.inputs]
	buildDir = "."
	filePath = "sitemap-netlify.xml"
					
[build]
	publish = "dist"

[functions]
  node_bundler = "esbuild"
	included_files = ["netlify/functions/lib/emails/html/*.html"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200